defaults:
  - envs
  - _self_

model_config:
  model_name: gpt-4o # should be registered in model_info
  max_concurrency: 16
  prompt_token_margin: 512

model_info:
  Qwen2.5-7B-Instruct:
    provider_name: together
    model_name: Qwen/Qwen2.5-7B-Instruct-Turbo
    generation_kwargs:
      temperature: 0
      max_tokens: 512
  Qwen2.5-72B-Instruct:
    provider_name: together
    model_name: Qwen/Qwen2.5-72B-Instruct-Turbo
    generation_kwargs:
      temperature: 0
      max_tokens: 512
  claude-3.7:
    provider_name: anthropic
    model_name: claude-3-7-sonnet-20250219
    generation_kwargs:
      temperature: 0
      max_tokens: 512 # max_completion_tokens if o1-mini
  gpt-4o:
    provider_name: openai
    model_name: gpt-4o
    generation_kwargs:
      temperature: 0
      max_tokens: 512 # max_completion_tokens if o1-mini
  OpenAI-5.2-Instant:
    provider_name: openai
    model_name: gpt-5.2
    generation_kwargs:
      max_completion_tokens: 512
      reasoning_effort: none
  OpenAI-5.2-Thinking:
    provider_name: openai
    model_name: gpt-5.2
    generation_kwargs:
      max_completion_tokens: 512
      reasoning_effort: high
  deepseek-r1:
    provider_name: deepseek
    model_name: deepseek-reasoner
    generation_kwargs:
      temperature: 0
      max_completion_tokens: 512
  deepseek-v3:
    provider_name: deepseek
    model_name: deepseek-chat
    generation_kwargs:
      temperature: 0
      max_completion_tokens: 512



es_manager:
  format_penalty: -0.1
  train:
    env_groups: 0
    group_size: 0
    start_group_index: 0
    env_configs:
      tags: ["CoordSokoban"]
      n_groups: [0]
  val:
    env_groups: 32
    group_size: 16
    start_group_index: 0
    rollout_chunk_size: 0
    env_configs:
      tags: ["CoordSokoban"]
      n_groups: [32]

system:
  CUDA_VISIBLE_DEVICES: "0"

seed:
  train: 10000
  val: 123

model_path: Qwen/Qwen2.5-3B-Instruct
enable_response_mask: True

lora:
  rank: 0
  alpha: 64
  target_modules: all-linear

actor_rollout_ref:
  model:
    path: ${model_path}
    lora_rank: ${lora.rank}
    lora_alpha: ${lora.alpha}
    target_modules: ${lora.target_modules}
  rollout:
    name: vllm
    log_prob_micro_batch_size_per_gpu: ${micro_batch_size_per_gpu}
    tensor_model_parallel_size: 1
    dtype: bfloat16
    max_model_len: 3600
    prompt_length: 1
    response_length: 400
    gpu_memory_utilization: 0.9
    max_num_batched_tokens: 8192
    enforce_eager: True
    free_cache_engine: True
    enable_chunked_prefill: False
    disable_log_stats: False
    val_kwargs:
      do_sample: True
      temperature: 0.5
      top_p: 1.0
      top_k: -1
      logprobs: 20 # return top20 logprobs

agent_proxy:
  context_window_mode: "full" # "full" | "limited_multi_turn" | "single_turn"
  max_context_window: -1 # k value: -1 for full history, 1 for no history (like without_history)
  batch_adjust_mode: copy # "copy" to duplicate samples, "delete" to remove samples when batch size is not divisible
  max_turn: 5
  action_sep: "||"
  max_actions_per_turn: 2 # how many actions can be output at most in a single turn
  use_turn_scores: False # important to GAE when applying token-level rewards to token-level advantages. If False, will take the sum of scores as the reward for the last turn.
  enable_think: True # False -> no think RL
  enable_ctx_wrapper: True
  ctx_log: True
  enable_es_wrapper: True
  debug_reward_flow: False
  "eval-estimation-single": False
  "eval-estimation-multi": False
  token_estimation: False
  token_estimation_reward:
    estimate_bonus: 0.2 
    accuracy_bonus_coef: 0.4
    compliance_penalty_coef: 0.0
  benchmark_factors:
    enabled: false
    mode: turn # token | turn | tool-call
    low_bound: 0
    high_bound: -1 # <0 means no upper bound
    penalty_coef: 0.0
    enable_adaptation: False 
    adaptation_happened_high_bound: 5
    adaptation_happened_low_bound: 3
    adaptation_high_bound: 5
    adaptation_low_bound: 3
  reward_normalization:
    grouping: "state" # state / batch / inductive
    method: "identity" # asym_clip / identity / mean_std
  mixed_turn_budget: 
    enabled: False
    mixed_budget: false
    mixed_budget_range: null # also can use [min, max] to specify
    reward_curve:
      use_hard: false
      tau: 1.0
  mixed_token_budget:
    enabled: False
    mixed_budget: false
    mixed_budget_range: null # also can use [min, max] to specify
    reward_curve:
      use_hard: false
      tau: 1.0


ctx_manager:
  generation:
    gen_config:
      response_length: ${actor_rollout_ref.rollout.response_length}
      temperature: ${actor_rollout_ref.rollout.temperature}
      top_p: ${actor_rollout_ref.rollout.top_p}
      top_k: ${actor_rollout_ref.rollout.top_k}
      kwargs: null

output:
  dir: results/eval
  filename: val_rollouts.pkl
  append_timestamp: true
  keep_batch_keys: null
  keep_non_tensor_keys: null
  keep_meta_info: true

wandb:
  enabled: false
  project: null
  name: null
  group: null
  tags: null
