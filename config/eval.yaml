defaults:
  - envs
  - base
  - _self_

hydra:
  searchpath:
    - pkg://verl.trainer.config

system:
  CUDA_VISIBLE_DEVICES: "0"

seed:
  train: 10000
  val: 123

model_path: Qwen/Qwen2.5-3B-Instruct
enable_response_mask: True

lora:
  rank: 0
  alpha: 64
  target_modules: all-linear

actor_rollout_ref:
  model:
    path: ${model_path}
    lora_rank: ${lora.rank}
    lora_alpha: ${lora.alpha}
    target_modules: ${lora.target_modules}
  rollout:
    name: vllm
    log_prob_micro_batch_size_per_gpu: 64
    tensor_model_parallel_size: 1
    dtype: bfloat16
    enable_sleep_mode: True
    max_model_len: 3600
    prompt_length: 1
    response_length: 400
    gpu_memory_utilization: 0.9
    max_num_batched_tokens: 8192
    enforce_eager: True
    disable_custom_all_reduce: True
    disable_mm_preprocessor_cache: True
    skip_tokenizer_init: False
    free_cache_engine: True
    enable_chunked_prefill: False
    enable_prefix_caching: True
    disable_log_stats: False
    trust_remote_code: True
    val_kwargs:
      do_sample: True
      temperature: 0.5
      top_p: 1.0
      top_k: -1
      logprobs: 20 # return top20 logprobs

agent_proxy:
  context_window_mode: "full"  # "full" | "limited_multi_turn" | "single_turn"
  max_context_window: -1
  max_turn: 5
  action_sep: "||"
  max_actions_per_turn: 2
  use_turn_scores: False
  enable_think: True
  qwen_enable_thinking: null
  "eval-estimation-single": False
  "eval-estimation-multi": False
  "eval-estimation-toolcall": False
  eval_adaptation_turn: False
  eval_adaptation_turn_scope: []
  eval_compliance_token: False
  eval_compliance_token_scope: []
  eval_compliance_turn: False
  eval_compliance_turn_scope: []
  eval_compliance_turn_mutation_turn: null
  eval_compliance_turn_budget_change: []
  eval_compliance_toolcall: False
  eval_compliance_toolcall_scope: []
  test_generate: False
  test_string_output: "<answer></answer>"
  lm_inputs_record_path: null
  es_outputs_record_path: null
  test_rewards: null
  reward_normalization:
    grouping: "state"
    method: "identity"

es_manager:
  format_penalty: -0.1
  train:
    env_groups: 8
    group_size: 16
    start_group_index: 0
    env_configs:
      tags: ["CoordSokoban"]
      n_groups: [8]
  val:
    env_groups: 32
    group_size: 16
    start_group_index: 0
    env_configs:
      tags: ["CoordSokoban"]
      n_groups: [32]

ctx_manager:
  generation:
    gen_config:
      response_length: ${actor_rollout_ref.rollout.response_length}
      temperature: ${actor_rollout_ref.rollout.temperature}
      top_p: ${actor_rollout_ref.rollout.top_p}
      top_k: ${actor_rollout_ref.rollout.top_k}
      kwargs: null

output:
  dir: results/eval
  filename: val_rollouts.pkl
  append_timestamp: true
  keep_batch_keys: null
  keep_non_tensor_keys: null
  keep_meta_info: true
