llm_model: null                                                 # The name of the LLM model to use
temperature: 0.7                                                # The temperature to use for sampling
max_attempts: 10                                                # The maximum number of attempts to query the LLM for a valid response
debug: False                                                    # Whether to enable debug mode for the LLM (see LLM agent for specific behavior)
sleep_time: 5                                                   # The time to sleep between LLM queries
max_feedback_steps: 5                                           # The maximum number of times to provide feedback for the LLM agent (before retrying)
feedback_attempts: 3                                            # The number of attempts to exceed feedback for the LLM agent (terminates when met)
use_vllm: False                                                 # Whether to use vLLM Python API directly
vllm_max_tokens: 512                                            # Max tokens for vLLM generation
vllm_max_model_len: ${llm.max_length}                           # Max model length for vLLM
vllm_dtype: auto                                                # vLLM dtype, e.g. auto/float16/bfloat16
vllm_tensor_parallel_size: 1                                    # vLLM tensor parallel size
vllm_gpu_memory_utilization: 0.9                                # vLLM GPU memory utilization
vllm_enforce_eager: False                                       # vLLM enforce eager mode
vllm_enable_prefix_caching: True                                # vLLM prefix caching
vllm_trust_remote_code: True                                    # vLLM trust_remote_code
vllm_top_p: null                                                # Optional top_p for vLLM
vllm_top_k: null                                                # Optional top_k for vLLM

# [Reflexion only]
retries: 0                                                      # The number of times to reset the environment and try again if the LLM agent fails

# In-context examples
num_examples: 0                                                 # The number of in-context examples to use for the LLM agent
example_dir_path: null                                          # The directory containing the in-context examples

# GPT Cost Estimator
mock: False                                                     # [gpt-cost-estimator] Whether to mock API calls
completion_tokens: 1                                            # [gpt-cost-estimator] The number of completion tokens to output for a mocked call

# Huggingface Pipeline
max_length: 30000        # The maximum number of tokens for the input to the LLM model

# Logging
log_path: ${hydra:runtime.output_dir}/in-context_example.txt    # The name of the file to save the log to

# Stochasticity
failure_probability: 0.0                                        # The probability of a failure occurring when querying the LLM agent

# Prompts
prompts:
  action_proposal_prompt:
    experiment_name: null
    prompt_description: null
    prompt_version: null
    model: ${llm.llm_model}
    temperature: ${llm.temperature}
    max_attempts: ${llm.max_attempts}
    debug: ${llm.debug}
    sleep_time: ${llm.sleep_time}
    mock: ${llm.mock}
    completion_tokens: ${llm.completion_tokens}
    use_vllm: ${llm.use_vllm}
    vllm_max_tokens: ${llm.vllm_max_tokens}
    vllm_max_model_len: ${llm.vllm_max_model_len}
    vllm_dtype: ${llm.vllm_dtype}
    vllm_tensor_parallel_size: ${llm.vllm_tensor_parallel_size}
    vllm_gpu_memory_utilization: ${llm.vllm_gpu_memory_utilization}
    vllm_enforce_eager: ${llm.vllm_enforce_eager}
    vllm_enable_prefix_caching: ${llm.vllm_enable_prefix_caching}
    vllm_trust_remote_code: ${llm.vllm_trust_remote_code}
    vllm_top_p: ${llm.vllm_top_p}
    vllm_top_k: ${llm.vllm_top_k}
